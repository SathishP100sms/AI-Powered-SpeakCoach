<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/src/logo.png" type="image/png">
    <title>SpeakCoach AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app" id="app">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="logo">
            <div class="logo-icon"><i class="ri-mic-2-fill"></i></div>
            <span>SpeakCoach</span>
        </div>

        <button class="new-chat" onclick="newChat()">
            <i class="ri-add-circle-line"></i>
            <span>New Session</span>
        </button>

        <div class="history-label">Recent Sessions</div>
        <div id="history" class="history"></div>

        <div class="sidebar-footer">
            <div class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
                <i class="ri-sun-line" id="theme-icon"></i>
            </div>
            <span class="version-tag">v2.0</span>
        </div>
    </aside>

    <!-- MOBILE OVERLAY -->
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <!-- MAIN -->
    <main class="main">

        <!-- TOP BAR -->
        <header class="topbar">
            <button class="hamburger" onclick="toggleSidebar()">
                <i class="ri-menu-line"></i>
            </button>

            <div class="topbar-title">
                <h2>AI Spoken English Tutor</h2>
                <p class="subtitle">Practice · Improve · Excel</p>
            </div>

            <div class="status-badge">
                <span class="status-dot"></span>
                <span>Online</span>
            </div>
        </header>

        <!-- FEATURE PILLS -->
        <div class="features-strip">
            <div class="feature-pill">
                <i class="ri-chat-voice-line"></i>
                <span>Real Conversations</span>
            </div>
            <div class="feature-pill">
                <i class="ri-edit-2-line"></i>
                <span>Grammar Correction</span>
            </div>
            <div class="feature-pill">
                <i class="ri-user-voice-line"></i>
                <span>Voice Practice</span>
            </div>
            <div class="feature-pill">
                <i class="ri-briefcase-4-line"></i>
                <span>Interview Training</span>
            </div>
        </div>

        <!-- MODE SELECTOR -->
        <div class="mode-bar">
            <button class="mode active" data-mode="conversation" onclick="setMode('conversation', this)">
                <i class="ri-chat-3-line"></i> Conversation
            </button>
            <button class="mode" data-mode="grammar" onclick="setMode('grammar', this)">
                <i class="ri-text"></i> Grammar
            </button>
            <button class="mode" data-mode="interview" onclick="setMode('interview', this)">
                <i class="ri-briefcase-line"></i> Interview
            </button>
        </div>

        <!-- CHAT AREA -->
        <div id="chat" class="chat">
            <!-- Welcome state -->
            <div class="welcome" id="welcome">
                <div class="welcome-icon"><i class="ri-mic-2-fill"></i></div>
                <h3>Start Practicing!</h3>
                <p>Type a message or tap the mic to begin your English coaching session.</p>
            </div>
        </div>

        <!-- INDICATORS -->
        <div id="typing" class="typing-indicator hidden">
            <div class="typing-avatar"><i class="ri-robot-2-line"></i></div>
            <div class="typing-dots">
                <span></span><span></span><span></span>
            </div>
        </div>

        <div id="wave" class="wave-bar hidden">
            <i class="ri-mic-fill wave-mic"></i>
            <div class="wave-bars">
                <span></span><span></span><span></span><span></span><span></span>
            </div>
            <span class="wave-label">Listening...</span>
        </div>

        <!-- INPUT AREA -->
        <div class="input-row">
            <div class="input-wrap">
                <input id="input"
                       placeholder="Type your message or use the mic..."
                       autocomplete="off"
                       onkeydown="if(event.key==='Enter') sendMessage()" />
                <button class="btn-mic" id="micBtn" onclick="startRecording()" title="Voice input">
                    <i class="ri-mic-line" id="micIcon"></i>
                </button>
            </div>
            <button class="btn-send" onclick="sendMessage()" title="Send">
                <i class="ri-send-plane-fill"></i>
            </button>
        </div>

    </main>
</div>

<script src="script.js"></script>
</body>
</html>
